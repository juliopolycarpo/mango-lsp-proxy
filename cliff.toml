# git-cliff configuration for mango-lsp-proxy.
# See https://git-cliff.org/docs/configuration/

[changelog]
header = """
# Changelog

All notable changes to this project are tracked from conventional commits.
"""
body = """

{% if version -%}
## {{ version | trim_start_matches(pat="v") }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## Unreleased
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}

{% for commit in commits -%}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif -%}
{% if commit.breaking %}**BREAKING** {% endif -%}
{{ commit.message | split(pat="\n") | first | trim | upper_first }}
{% endfor %}
{% endfor %}
"""
trim = false
render_always = false
postprocessors = [
  { pattern = '\n{3,}', replace = "\n\n" },
  { pattern = 'commits\.\n##', replace = "commits.\n\n##" },
]

[git]
conventional_commits = true
filter_unconventional = false
require_conventional = false
split_commits = false
protect_breaking_commits = true
filter_commits = false
fail_on_unmatched_commit = false
use_branch_tags = false
topo_order = false
topo_order_commits = true
sort_commits = "oldest"
recurse_submodules = false

commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactoring" },
  { message = "^docs?", group = "<!-- 4 -->Documentation" },
  { message = "^test", group = "<!-- 5 -->Tests" },
  { message = "^build", group = "<!-- 6 -->Build System" },
  { message = "^ci", group = "<!-- 7 -->CI" },
  { message = "^style", group = "<!-- 8 -->Style" },
  { message = "^chore\\(release\\): prepare", skip = true },
  { message = "^chore\\(deps.*\\)", skip = true },
  { message = "^chore|^revert", group = "<!-- 9 -->Maintenance" },
  { message = ".*", group = "<!-- 9 -->Maintenance" },
]

[remote.github]
owner = "juliopolycarpo"
repo = "mango-lsp-proxy"
