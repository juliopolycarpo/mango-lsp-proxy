name: CodeQL

on:
  push:
    branches:
      - main
      - master
      - develop
      - "release/**"
      - "hotfix/**"
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "test/**"
      - "docs/**"
      - "perf/**"
      - "refactor/**"
      - "style/**"
      - "ci/**"
      - "security/**"
      - "dependencies/**"
      - "deps/**"
      - "claude/**"
      - "codex/**"
      - "copilot/**"
  pull_request:
    branches:
      - main
      - master
      - develop
      - "release/**"
      - "hotfix/**"
  schedule:
    - cron: "32 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
