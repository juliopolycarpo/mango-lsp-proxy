name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*"
      - "v[0-9]*.[0-9]*"

permissions:
  contents: write
  id-token: write

env:
  BUN_VERSION: 1.3.14

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve release version
        id: version
        run: bun scripts/release-version.ts "$GITHUB_REF_NAME" --github-output

      - name: Apply release version
        run: bun scripts/apply-release-version.ts "${{ steps.version.outputs.package_version }}"

      - name: Run checks
        run: bun run check

      - name: Run tests
        run: bun test

      - name: Build native binaries
        run: bun scripts/build.ts --clean

      - name: Smoke native binaries
        run: bun run smoke:bin

      - name: Package release assets
        run: >-
          bun scripts/release-artifacts.ts
          --display-version "${{ steps.version.outputs.display_version }}"
          --package-version "${{ steps.version.outputs.package_version }}"
          --tag "$GITHUB_REF_NAME"
          --sha "$GITHUB_SHA"

      - name: Generate release notes
        run: >-
          bun scripts/changelog.ts release-notes
          --tag "$GITHUB_REF_NAME"
          --output dist/release/release-notes.md
          --assets dist/release/release-assets.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          args=(
            release
            create
            "$GITHUB_REF_NAME"
            --verify-tag
            --title
            "mango-lsp ${{ steps.version.outputs.display_version }}"
            --notes-file
            dist/release/release-notes.md
          )

          if [[ "${{ steps.version.outputs.prerelease }}" == "true" ]]; then
            args+=(--prerelease)
          else
            args+=(--latest)
          fi

          gh "${args[@]}" dist/release/mango-lsp-* dist/release/install.sh dist/release/install.ps1

      - name: Setup Node for npm publishing
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish packages to npm
        run: bun scripts/publish-packages.ts --tag "${{ steps.version.outputs.npm_tag }}"
