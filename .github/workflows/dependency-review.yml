name: Dependency Review

on:
  pull_request:
    branches:
      - main
      - master
      - develop
      - "release/**"
      - "hotfix/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
          allow-dependencies-licenses: 'pkg:githubactions/actions/checkout@*,pkg:githubactions/actions/setup-node@*,pkg:githubactions/oven-sh/setup-bun@*'
