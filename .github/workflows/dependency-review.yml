name: Dependency Review

on:
  pull_request:
    branches:
      - main
      - master
      - develop
      - "release/**"
      - "hotfix/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Review Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
