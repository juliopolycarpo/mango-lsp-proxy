name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - "release/**"
      - "hotfix/**"
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "test/**"
      - "docs/**"
      - "perf/**"
      - "refactor/**"
      - "style/**"
      - "ci/**"
      - "security/**"
      - "dependencies/**"
      - "deps/**"
      - "claude/**"
      - "codex/**"
      - "copilot/**"
  pull_request:
    branches:
      - main
      - master
      - develop
      - "release/**"
      - "hotfix/**"

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14

jobs:
  check:
    name: Check, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

      - name: Run tests
        run: bun test

      - name: Build CLI bundle
        run: bun run build
