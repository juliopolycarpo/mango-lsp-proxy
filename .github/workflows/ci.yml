name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - "release/**"
      - "hotfix/**"
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "test/**"
      - "docs/**"
      - "perf/**"
      - "refactor/**"
      - "style/**"
      - "ci/**"
      - "security/**"
      - "dependencies/**"
      - "deps/**"
      - "claude/**"
      - "codex/**"
      - "copilot/**"
  pull_request:
    branches:
      - main
      - master
      - develop
      - "release/**"
      - "hotfix/**"

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.14

jobs:
  check:
    name: Check, Coverage, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Restore Bun cache
        id: bun-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

      - name: Run coverage gate
        run: bun run test:coverage

      - name: Build CLI bundle
        run: bun run build

      - name: Save Bun cache
        if: github.event_name == 'push' && steps.bun-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
